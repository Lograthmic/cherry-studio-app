name: iOS Build Nightly

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # Step 3: Install pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # Step 4: Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      # Step 5: Prebuild iOS project
      - name: Prebuild iOS project
        run: pnpm prebuild --platform ios

      - name: Clean and reinstall Pods
        run: |
          cd ios
          pod deintegrate
          pod cache clean --all
          pod install
      
      # Step 6: Build unsigned .app
      - name: Build unsigned .app
        run: |
          cd ios
          xcodebuild -workspace CherryStudio.xcworkspace \
            -scheme CherryStudio \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build
      
      # Step 7: Package as IPA
      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r ios/build/Build/Products/Release-iphoneos/CherryStudio.app Payload/
          zip -r CherryStudio.ipa Payload/
      
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: CherryStudio-unsigned
          path: CherryStudio.ipa